<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat Organizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #111; background: #f8f8f6; min-height: 100vh; }
#app { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
#header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
#header h1 { font-size: 16px; font-weight: 500; }
.sub { font-size: 12px; color: #888; }
.status { font-size: 13px; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; }
.status.idle { background: #f0f0ee; color: #555; }
.status.loading { background: #eff6ff; color: #1d4ed8; }
.status.ok { background: #edf7ed; color: #1a6b1a; }
.status.err { background: #fdecea; color: #b01a1a; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
select.filter { font-size: 12px; padding: 5px 8px; border: 1px solid #d0d0cc; border-radius: 6px; background: #fff; }
.pending-count { font-size: 12px; color: #999; }
.group { margin-bottom: 12px; }
.group-header { display: flex; align-items: center; gap: 8px; padding: 7px 10px 7px 12px; background: #f4f4f1; border: 1px solid #e0e0dc; border-radius: 8px; cursor: pointer; user-select: none; }
.group-header.open { border-radius: 8px 8px 0 0; border-bottom: none; }
.group-header.unassigned { background: #fffbf0; border-color: #e8d9a0; }
.chevron { font-size: 10px; color: #aaa; transition: transform 0.15s; display: inline-block; flex-shrink: 0; }
.chevron.open { transform: rotate(90deg); }
.group-name { font-size: 12px; font-weight: 500; color: #444; flex: 1; }
.group-name.unassigned { color: #7a5c00; }
.group-count { font-size: 11px; color: #999; flex-shrink: 0; }
.prefix-btn { font-size: 11px; padding: 2px 8px; border: 1px solid #c0c0bc; border-radius: 4px; background: #fff; color: #555; cursor: pointer; flex-shrink: 0; }
.prefix-btn.active { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
.group-body { border: 1px solid #e0e0dc; border-radius: 0 0 8px 8px; background: #fff; overflow: hidden; }
.group-body.unassigned { border-color: #e8d9a0; }
.chat-row { display: flex; align-items: center; gap: 8px; padding: 5px 12px; border-bottom: 1px solid #f0f0ec; }
.chat-row:nth-child(even) { background: #fafaf8; }
.chat-row.deleted { background: #fff5f5; opacity: 0.6; }

/* Dark mode */
body.dark { background: #1a1a1a; color: #e0e0dc; }
body.dark .status.idle { background: #2a2a2a; color: #999; }
body.dark .status.loading { background: #1e2a3a; color: #93c5fd; }
body.dark .status.ok { background: #1a2a1a; color: #6abf6a; }
body.dark .status.err { background: #2a1a1a; color: #f87171; }
body.dark .group-header { background: #252525; border-color: #333; }
body.dark .group-header.unassigned { background: #2a2510; border-color: #4a3f1a; }
body.dark .group-name { color: #ccc; }
body.dark .group-name.unassigned { color: #c4a84a; }
body.dark .group-body { background: #1e1e1e; border-color: #333; }
body.dark .group-body.unassigned { border-color: #4a3f1a; }
body.dark .chat-row { border-bottom-color: #2a2a2a; }
body.dark .chat-row:nth-child(even) { background: #222; }
body.dark .chat-row.deleted { background: #2a1a1a; }
body.dark .row-num { color: #555; }
body.dark .row-title { color: #ddd; }
body.dark .row-title:hover:not(:disabled) { border-color: #444; background: #2a2a2a; }
body.dark .row-title:focus { background: #1a1a1a; border-color: #3b82f6; }
body.dark .row-date { color: #555; }
body.dark .row-select { background: #2a2a2a; border-color: #444; color: #ddd; }
body.dark .row-del { background: #2a2a2a; border-color: #333; color: #666; }
body.dark .row-del.active { background: #3a1a1a; border-color: #7f1d1d; color: #f87171; }
body.dark .btn { background: #2a2a2a; border-color: #444; color: #ddd; }
body.dark .btn:hover { background: #333; }
body.dark .log-wrap { background: #1a1a1a; border-color: #333; color: #ccc; }
body.dark .toolbar select { background: #2a2a2a; border-color: #444; color: #ddd; }
body.dark .prefix-btn { background: #2a2a2a; border-color: #444; color: #aaa; }
body.dark .prefix-btn.active { background: #1e2a3a; border-color: #3b82f6; color: #93c5fd; }
.row-num { font-size: 11px; color: #bbb; min-width: 22px; text-align: right; flex-shrink: 0; }
.row-title { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; border-radius: 4px; padding: 1px 4px; background: transparent; color: inherit; cursor: text; min-width: 0; }
.row-title:hover:not(:disabled) { border-color: #d0d0cc; background: #fafaf8; }
.row-title:focus { outline: none; border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
.row-title.deleted { text-decoration: line-through; color: #aaa; }
.row-date { font-size: 11px; color: #aaa; min-width: 44px; text-align: right; flex-shrink: 0; }
.row-select { font-size: 12px; padding: 3px 5px; border: 1px solid #d0d0cc; border-radius: 6px; background: #fff; min-width: 150px; max-width: 195px; flex-shrink: 0; }
.row-del { font-size: 11px; padding: 2px 7px; border: 1px solid #e0e0dc; border-radius: 4px; background: #fff; color: #bbb; cursor: pointer; flex-shrink: 0; }
.row-del.active { border-color: #fca5a5; background: #fef2f2; color: #b91c1c; }
.actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
.btn { padding: 7px 14px; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #d0d0cc; background: #fff; color: #111; }
.btn:hover { background: #f4f4f1; }
.btn-primary { padding: 7px 14px; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #2563eb; background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.summary { font-size: 12px; color: #888; margin-top: 8px; }
.log-wrap { margin-top: 10px; font-size: 12px; font-family: Consolas, monospace; background: #f8f8f6; border: 1px solid #e0e0dc; border-radius: 6px; padding: 8px 10px; max-height: 220px; overflow-y: auto; }
.log-line.ok { color: #1a6b1a; }
.log-line.err { color: #b01a1a; }
.log-line.warn { color: #92600a; }
</style>
<script src="content-organizer.js"></script>
</head>
<body>
<div id="app"></div>
<script src="organizer.js"></script>
</body>
</html>
