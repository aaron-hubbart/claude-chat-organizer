name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST=$(git tag --sort=-version:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          LATEST="${{ steps.get_tag.outputs.latest }}"
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          echo "new_version=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Build source zip
        id: zip
        run: |
          ZIP_NAME="source-${{ steps.bump.outputs.new_version }}.zip"
          mkdir -p staging
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='tests' \
            --exclude='test' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='coverage' \
            --exclude='node_modules' \
            --exclude='.env*' \
            --exclude='*.test.*' \
            --exclude='*.spec.*' \
            --exclude='.eslintrc*' \
            --exclude='.prettierrc*' \
            --exclude='jest.config*' \
            --exclude='staging' \
            . staging/
          cd staging && zip -r ../$ZIP_NAME .
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin ${{ steps.bump.outputs.new_version }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          name: ${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.zip_name }}
